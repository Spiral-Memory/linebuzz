<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linebuzz Slack Sync</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-minimal">

  <main class="auth-container">

    <div class="state-container state-success">
      <header class="branding-header">
        <div class="connection-wrapper">
          <div class="logo-box linebuzz-box">
            <svg class="brand-logo" width="48" height="48" viewBox="40 40 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M70 60 C50 60 50 80 50 100 C50 120 50 140 70 140" stroke="#1dc360" stroke-width="12" stroke-linecap="round" fill="none"/>
              <path d="M130 60 C150 60 150 80 150 100 C150 120 150 140 130 140" stroke="#4e8072" stroke-width="12" stroke-linecap="round" fill="none"/>
              <line x1="75" y1="90" x2="125" y2="90" stroke="#109e4a" stroke-width="8" stroke-linecap="round"/>
              <line x1="75" y1="110" x2="105" y2="110" stroke="#8bb8aa" stroke-width="8" stroke-linecap="round"/>
            </svg>
          </div>
          
          <div class="connection-bridge-box">
            <svg class="connection-bridge" width="260" height="20" viewBox="0 0 260 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path class="base-line" d="M10 10 H250" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" stroke-dasharray="4 4" stroke-linecap="round"/>
              <path class="active-flow" d="M10 10 H250" stroke="var(--color-brand)" stroke-width="2" stroke-dasharray="12 40" stroke-linecap="round"/>
            </svg>
            <span class="bridge-status loading font-mono" id="status-pill-success">$ linebuzz sync --slack</span>
          </div>
          
          <div class="logo-box slack-box">
            <svg class="slack-logo" xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="44" height="44" viewBox="0 0 48 48">
            <path fill="#33d375" d="M33,8c0-2.209-1.791-4-4-4s-4,1.791-4,4c0,1.254,0,9.741,0,11c0,2.209,1.791,4,4,4s4-1.791,4-4	C33,17.741,33,9.254,33,8z"></path><path fill="#33d375" d="M43,19c0,2.209-1.791,4-4,4c-1.195,0-4,0-4,0s0-2.986,0-4c0-2.209,1.791-4,4-4S43,16.791,43,19z"></path><path fill="#40c4ff" d="M8,14c-2.209,0-4,1.791-4,4s1.791,4,4,4c1.254,0,9.741,0,11,0c2.209,0,4-1.791,4-4s-1.791-4-4-4	C17.741,14,9.254,14,8,14z"></path><path fill="#40c4ff" d="M19,4c2.209,0,4,1.791,4,4c0,1.195,0,4,0,4s-2.986,0-4,0c-2.209,0-4-1.791-4-4S16.791,4,19,4z"></path><path fill="#e91e63" d="M14,39.006C14,41.212,15.791,43,18,43s4-1.788,4-3.994c0-1.252,0-9.727,0-10.984	c0-2.206-1.791-3.994-4-3.994s-4,1.788-4,3.994C14,29.279,14,37.754,14,39.006z"></path><path fill="#e91e63" d="M4,28.022c0-2.206,1.791-3.994,4-3.994c1.195,0,4,0,4,0s0,2.981,0,3.994c0,2.206-1.791,3.994-4,3.994	S4,30.228,4,28.022z"></path><path fill="#ffc107" d="M39,33c2.209,0,4-1.791,4-4s-1.791-4-4-4c-1.254,0-9.741,0-11,0c-2.209,0-4,1.791-4,4s1.791,4,4,4	C29.258,33,37.746,33,39,33z"></path><path fill="#ffc107" d="M28,43c-2.209,0-4-1.791-4-4c0-1.195,0-4,0-4s2.986,0,4,0c2.209,0,4,1.791,4,4S30.209,43,28,43z"></path>
            </svg>
          </div>
        </div>
      </header>

      <section class="message-section">
        <h1 class="main-title">You're connected!</h1>
        <p class="main-subtitle">Slack is connected. Close this up and get back to coding.</p>
      </section>

      <section class="action-section">
        <a href="#" class="btn btn-action redirect-btn font-mono">
          <span>RETURN TO IDE</span>
          <svg class="btn-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </a>
      </section>
    </div>

    <div class="state-container state-failed">
      <header class="branding-header">
        <div class="connection-wrapper">
          <div class="logo-box linebuzz-box">
            <svg class="brand-logo" width="48" height="48" viewBox="40 40 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M70 60 C50 60 50 80 50 100 C50 120 50 140 70 140" stroke="#1dc360" stroke-width="12" stroke-linecap="round" fill="none"/>
              <path d="M130 60 C150 60 150 80 150 100 C150 120 150 140 130 140" stroke="#4e8072" stroke-width="12" stroke-linecap="round" fill="none"/>
              <line x1="75" y1="90" x2="125" y2="90" stroke="#109e4a" stroke-width="8" stroke-linecap="round"/>
              <line x1="75" y1="110" x2="105" y2="110" stroke="#8bb8aa" stroke-width="8" stroke-linecap="round"/>
            </svg>
          </div>
          
          <div class="connection-bridge-box">
            <svg class="connection-bridge" width="260" height="20" viewBox="0 0 260 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path class="base-line" d="M10 10 H250" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" stroke-dasharray="4 4" stroke-linecap="round"/>
              <path class="active-flow" d="M10 10 H250" stroke="var(--color-error)" stroke-width="2" stroke-dasharray="12 40" stroke-linecap="round"/>
            </svg>
            <span class="bridge-status loading font-mono" id="status-pill-failed">$ linebuzz sync --slack</span>
          </div>
          
          <div class="logo-box slack-box">
            <svg class="slack-logo" xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="44" height="44" viewBox="0 0 48 48">
            <path fill="#33d375" d="M33,8c0-2.209-1.791-4-4-4s-4,1.791-4,4c0,1.254,0,9.741,0,11c0,2.209,1.791,4,4,4s4-1.791,4-4	C33,17.741,33,9.254,33,8z"></path><path fill="#33d375" d="M43,19c0,2.209-1.791,4-4,4c-1.195,0-4,0-4,0s0-2.986,0-4c0-2.209,1.791-4,4-4S43,16.791,43,19z"></path><path fill="#40c4ff" d="M8,14c-2.209,0-4,1.791-4,4s1.791,4,4,4c1.254,0,9.741,0,11,0c2.209,0,4-1.791,4-4s-1.791-4-4-4	C17.741,14,9.254,14,8,14z"></path><path fill="#40c4ff" d="M19,4c2.209,0,4,1.791,4,4c0,1.195,0,4,0,4s-2.986,0-4,0c-2.209,0-4-1.791-4-4S16.791,4,19,4z"></path><path fill="#e91e63" d="M14,39.006C14,41.212,15.791,43,18,43s4-1.788,4-3.994c0-1.252,0-9.727,0-10.984	c0-2.206-1.791-3.994-4-3.994s-4,1.788-4,3.994C14,29.279,14,37.754,14,39.006z"></path><path fill="#e91e63" d="M4,28.022c0-2.206,1.791-3.994,4-3.994c1.195,0,4,0,4,0s0,2.981,0,3.994c0,2.206-1.791,3.994-4,3.994	S4,30.228,4,28.022z"></path><path fill="#ffc107" d="M39,33c2.209,0,4-1.791,4-4s-1.791-4-4-4c-1.254,0-9.741,0-11,0c-2.209,0-4,1.791-4,4s1.791,4,4,4	C29.258,33,37.746,33,39,33z"></path><path fill="#ffc107" d="M28,43c-2.209,0-4-1.791-4-4c0-1.195,0-4,0-4s2.986,0,4,0c2.209,0,4,1.791,4,4S30.209,43,28,43z"></path>
            </svg>
          </div>
        </div>
      </header>

      <section class="message-section">
        <h1 class="main-title">Oops! Something went wrong.</h1>
      </section>

      <section class="suggestion-section">
        <p class="suggestion-text font-mono">Try again, check with your workspace admin<br>or still stuck? <a href="https://github.com/Spiral-Memory/linebuzz/issues/new" target="_blank" style="color: var(--color-text-main); text-decoration: underline;">report a bug</a>.</p>
      </section>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
